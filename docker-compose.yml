version: '3.8'

services:
  # 1. CATALOG: Project Nessie (Cerveau de l'architecture)
  nessie:
    image: projectnessie/nessie:latest  # رجعناها latest باش يلقاها دغيا
    container_name: nessie
    ports:
      - "19120:19120"
    networks:
      - data-network

  # 2. STORAGE: MinIO (S3 local)
  minio:
    image: minio/minio
    container_name: minio
  
    ports:
      - "9000:9000" # API (Data)
      - "9001:9001" # Console (UI)
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    networks:
      - data-network

  # 3. STREAMING: Kafka & Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - data-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - data-network
    
  data-generator:  
    image: python:3.9-slim  
    container_name: data_generator  
    depends_on:
      - kafka  
    volumes:
      - ./scripts:/app  
    working_dir: /app  
    command: >
      sh -c "pip install --default-timeout=100 kafka-python faker && export PYTHONUNBUFFERED=1 && python -u data_generator.py"
    networks:
      - data-network  

  # 4. PROCESSING: Apache Spark
  spark:
    image: tabulario/spark-iceberg
    container_name: spark
    dns: 
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - nessie
      - minio
      - kafka
    ports:
      - "10000:10000"
      - "8081:8080"
    volumes:
      - ./scripts:/home/iceberg/work/spark/scripts
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark_checkpoints:/tmp/checkpoints
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    networks:
      - data-network

  # 5. QUERY ENGINE: Trino
  trino:
    image: trinodb/trino
    container_name: trino
    
    depends_on:
      - nessie
      - minio
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    networks:
      - data-network

  # 6. ORCHESTRATION: Airflow (SequentialExecutor pour plus de légèreté)
  airflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: apache/airflow:2.7.1-custom
    container_name: airflow
    depends_on:
      - spark
    ports:
      - "8083:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - ./dags:/opt/airflow/dags
      - ./dbt_project:/opt/airflow/dbt
      - ./scripts:/opt/airflow/scripts
    command: standalone
    networks:
      - data-network
networks:
  data-network:
    name: data-network
    driver: bridge