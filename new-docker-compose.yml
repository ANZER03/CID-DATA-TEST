
services:
  # 1. CATALOG: Project Nessie
  nessie:
    build:
      context: ./docker-infra/nessie
    image: custom-nessie:latest
    container_name: nessie
    ports:
      - "19120:19120"
    networks:
      - data-network

  # 2. STORAGE: MinIO (S3 local)
  minio:
    build:
      context: ./docker-infra/minio
    image: custom-minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - data-network

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 admin password) do echo 'Waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb local/bronze || true;
      /usr/bin/mc mb local/silver || true;
      /usr/bin/mc mb local/gold || true;
      exit 0;
      "
    networks:
      - data-network

  # 3. STREAMING: Kafka & Zookeeper
  zookeeper:
    build:
      context: ./docker-infra/zookeeper
    image: custom-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Enable ruok for healthcheck
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - data-network

  kafka:
    build:
      context: ./docker-infra/kafka
    image: custom-kafka:latest
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - data-network

  kafka-init:
    build:
      context: ./docker-infra/kafka
    image: custom-kafka:latest
    container_name: kafka_init
    depends_on:
      - kafka
    command: >
      bash -c "
      echo 'Waiting for Kafka to be ready...' &&
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic raw_transactions --partitions 1 --replication-factor 1 &&
      echo 'Topic raw_transactions created successfully' &&
      exit 0
      "
    networks:
      - data-network

  data-generator:
    build:
      context: .
      dockerfile: ./docker-infra/data-generator/Dockerfile
    image: custom-data-generator:latest
    container_name: data_generator
    depends_on:
      - kafka
      - kafka-init
    networks:
      - data-network

  # 4. PROCESSING: Apache Spark
  spark:
    build:
      context: .
      dockerfile: ./docker-infra/spark/Dockerfile
    image: custom-spark:latest
    container_name: spark
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      - nessie
      - minio
      - kafka
    ports:
      - "10000:10000"
      - "8081:8080"
    volumes:
      - spark-checkpoints:/tmp/spark-checkpoints
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=password
      - AWS_REGION=us-east-1
    command: /opt/spark/bin/spark-submit --master local[1] --driver-memory 512m --executor-memory 512m /opt/spark/work/scripts/ingest_bronze.py
    networks:
      - data-network

  # 5. QUERY ENGINE: Trino
  trino:
    build:
      context: .
      dockerfile: ./docker-infra/trino/Dockerfile
    image: custom-trino:latest
    container_name: trino
    depends_on:
      - nessie
      - minio
    ports:
      - "8080:8080"
    networks:
      - data-network

  # 6. ORCHESTRATION: Airflow
  airflow:
    build:
      context: .
      dockerfile: ./docker-infra/airflow/Dockerfile
    image: custom-airflow:latest
    container_name: airflow
    depends_on:
      - spark
    ports:
      - "8083:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      - airflow-db:/opt/airflow
    command: standalone
    networks:
      - data-network

volumes:
  minio-data:
  zookeeper-data:
  kafka-data:
  spark-checkpoints:
  airflow-db:

networks:
  data-network:
    name: data-network
    driver: bridge
